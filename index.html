  const alreadyHad = getTotal(entry) - entry.missing.length;

    setSyncStatus('', '● Erro ao salvar');
  }
}

// ── FIREBASE LISTEN ──
function startListening() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  unsubscribeSnapshot = onSnapshot(doc(db, 'albums', 'shared'), (snap) => {
    if (snap.exists()) {
      const newState = new Set(snap.data().got || []);
      // only rebuild if state changed
      const changed = [...newState].some(k => !state.has(k)) || [...state].some(k => !newState.has(k));
      if (changed) {
        state = newState;
        buildGrid();
        renderStats();
        applyFilter();
      }
      setSyncStatus('synced', '● Sincronizado ✓');
    } else {
      setSyncStatus('synced', '● Sincronizado ✓');
    }
  }, () => setSyncStatus('', '● Sem conexão'));
}

// ── AUTH ──
window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    errEl.textContent = 'E-mail ou senha incorretos.';
  }
};

window.doLogout = async function() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  await signOut(auth);
};

// Enter key on login
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });
document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-password').focus(); });

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').classList.add('visible');
    buildGrid();
    renderStats();
    applyFilter();
    startListening();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').classList.remove('visible');
    if (unsubscribeSnapshot) unsubscribeSnapshot();
  }
});

// ── UNDO ──
function updateUndoBtn() {
  const btn = document.getElementById('btn-undo');
  document.getElementById('undo-count').textContent = history.length;
  btn.disabled = history.length === 0;
}

window.undo = async function() {
  if (history.length === 0) return;
  const { code, num } = history.pop();
  state.delete(getKey(code, num));
  await saveToCloud();
  reinsertSticker(code, num);
  updateCardBadge(code);
  renderStats();
  applyFilter();
  updateUndoBtn();
  showToast(`↩ Desfeito: ${code} #${num} voltou`);
};

// ── MARK GOT ──
window.markGot = async function(code, num) {
  state.add(getKey(code, num));
  history.push({ code, num });
  if (history.length > MAX_UNDO) history.shift();
  updateUndoBtn();
  const el = document.getElementById(`sticker_${code}_${num}`);
  if (el) {
    el.classList.add('removing');
    setTimeout(() => {
      el.remove();
      updateCardBadge(code);
      checkAllDone(code);
      renderStats();
      applyFilter();
    }, 250);
  }
  showToast(`✓ ${code} #${num} marcada!`);
  await saveToCloud();
};

function reinsertSticker(code, num) {
  const container = document.getElementById(`stickers-${code}`);
  if (!container) return;
  const doneMsg = container.querySelector('.all-done-msg');
  if (doneMsg) doneMsg.remove();
  const el = document.createElement('div');
  el.className = 'sticker'; el.id = `sticker_${code}_${num}`;
  el.textContent = num; el.onclick = () => window.markGot(code, num);
  const existing = [...container.querySelectorAll('.sticker')];
  let inserted = false;
  for (const s of existing) { if (parseInt(s.textContent) > num) { container.insertBefore(el, s); inserted = true; break; } }
  if (!inserted) container.appendChild(el);
  const card = document.getElementById('card-' + code);
  if (card) card.classList.remove('all-done');
}

function checkAllDone(code) {
  const entry = data.find(d => d.code === code);
  if (getRemainingMissing(entry).length === 0) {
    const container = document.getElementById(`stickers-${code}`);
    if (container && !container.querySelector('.all-done-msg')) {
      const msg = document.createElement('div'); msg.className = 'all-done-msg'; msg.textContent = '✓ Completa!';
      container.appendChild(msg);
    }
    const card = document.getElementById('card-' + code);
    if (card) card.classList.add('all-done');
  }
}

function updateCardBadge(code) {
  const entry = data.find(d => d.code === code);
  const total = getTotal(entry); const have = getOwnedCount(entry);
  const badge = document.querySelector(`#card-${code} .country-badge`);
  if (badge) { badge.textContent = have === total ? '✓ Completa' : `${have}/${total}`; badge.className = 'country-badge' + (have === total ? ' done' : ''); }
}

function renderStats() {
  let totalAlbum = 0, totalHave = 0;
  data.forEach(e => { totalAlbum += getTotal(e); totalHave += getOwnedCount(e); });
  const pct = totalAlbum ? Math.round(totalHave / totalAlbum * 100) : 0;
  document.getElementById('total-count').textContent = totalAlbum;
  document.getElementById('have-count').textContent = totalHave;
  document.getElementById('need-count').textContent = totalAlbum - totalHave;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '% completo';
}

function buildGrid() {
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  data.forEach(entry => {
    const total = getTotal(entry); const have = getOwnedCount(entry);
    const allDone = have === total; const remaining = getRemainingMissing(entry);
    const flag = flagMap[entry.code] || '';
    const card = document.createElement('div');
    card.className = 'country-card' + (allDone ? ' all-done' : ''); card.id = 'card-' + entry.code;
    const stickersHTML = remaining.map(num =>
      `<div class="sticker" id="sticker_${entry.code}_${num}" onclick="markGot('${entry.code}',${num})" title="${entry.code} #${num}">${num}</div>`
    ).join('') + (allDone ? '<div class="all-done-msg">✓ Completa!</div>' : '');
    card.innerHTML = `
      <div class="country-header">
        <div class="country-name-wrap"><span class="country-flag">${flag}</span><span class="country-name">${entry.code}</span></div>
        <span class="country-badge${allDone ? ' done' : ''}">${allDone ? '✓ Completa' : have + '/' + total}</span>
      </div>
      <div class="stickers" id="stickers-${entry.code}">${stickersHTML}</div>`;
    grid.appendChild(card);
  });
}

window.applyFilter = function() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let anyVisible = false;
  data.forEach(entry => {
    const card = document.getElementById('card-' + entry.code); if (!card) return;
    const show = !q || entry.code.toLowerCase().includes(q);
    card.classList.toggle('hidden', !show); if (show) anyVisible = true;
  });
  let empty = document.getElementById('empty-msg');
  if (!anyVisible) {
    if (!empty) { empty = document.createElement('div'); empty.id = 'empty-msg'; empty.className = 'empty'; empty.textContent = 'Nenhuma seleção encontrada'; document.getElementById('grid').appendChild(empty); }
  } else if (empty) empty.remove();
};
</script>
